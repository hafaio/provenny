# Publish a tagged release to PyPI, then the GitHub release; keep the name release.yml for PyPI trusted publishing.
name: release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: write # create the GitHub release
  id-token: write # trusted publishing to PyPI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Build wheel and sdist
        run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # a dedicated environment scopes the OIDC token to this upload-only job
    environment:
      name: pypi
      url: https://pypi.org/project/provenny/
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.tag }}" --generate-notes
