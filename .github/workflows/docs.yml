# Build docs from a tag and deploy to Pages; dispatched by cut.yml, re-runnable by hand.
name: docs
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build docs from (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/configure-pages@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --locked
      - name: Build site
        run: uv run sphinx-build -M html docs out
      - uses: actions/upload-pages-artifact@v5
        with:
          path: "./out/html"

  # separate from the build so a failed deploy re-runs without rebuilding the artifact
  docs-deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
